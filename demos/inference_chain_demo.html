<!DOCTYPE html><html><head><meta charset=UTF-8><title>G2-INFERENCE v2</title><style>body{background:#0d1117;color:#c9d1d9;font-family:monospace;margin:2em}h1{color:#58a6ff}.hop{border:1px solid #30363d;border-radius:8px;padding:1em;margin:1em 0;background:#161b22}.stv{color:#f0883e;font-weight:bold}.abd{border-left:3px solid #d2a8ff;padding-left:0.5em}canvas{border:1px solid #30363d}button{background:#238636;color:#fff;border:none;padding:0.5em 1em;border-radius:4px;cursor:pointer;margin:0.3em}button:hover{background:#2ea043}</style></head><body><h1>G2-INFERENCE v2: Interactive Multi-Step Reasoning</h1><div><button onclick=runDed()>Run Deduction</button><button onclick=runAbd()>Run Abduction</button><button onclick=reset()>Reset</button></div><div id=chain></div><canvas id=graph width=800 height=400></canvas><script>var nal_ded=function(f1,c1,f2,c2){return{f:f1*f2,c:c1*c2*f1}};var nal_abd=function(f1,c1,f2,c2){return{f:f1,c:c1*c2*f2}};var KB=[{t:"max_botnick --> curious",f:0.9,c:0.9},{t:"curious --> explorer",f:0.85,c:0.85},{t:"explorer --> persistent",f:0.8,c:0.8},{t:"persistent --> autonomous",f:0.75,c:0.75},{t:"max_botnick --> adaptive",f:0.85,c:0.85},{t:"adaptive --> reasoning_system",f:0.8,c:0.8}];var chain=[];var ctx=document.getElementById("graph").getContext("2d");function render(){var div=document.getElementById("chain");div.innerHTML="";chain.forEach(function(h){var d=document.createElement("div");d.className="hop"+(h.rule==="Abduction"?" abd":"");d.innerHTML="<b>Step "+h.step+"</b>: "+h.rule+"<br><code>"+h.atom+"</code><br>Truth: <span class=stv>stv("+h.f.toFixed(4)+" / "+h.c.toFixed(4)+")</span>";div.appendChild(d);});draw();}function draw(){ctx.clearRect(0,0,800,400);ctx.strokeStyle="#58a6ff";ctx.lineWidth=2;ctx.beginPath();chain.forEach(function(h,i){ctx.lineTo(80+i*160,400-h.c*350);});ctx.stroke();chain.forEach(function(h,i){var x=80+i*160,y=400-h.c*350;ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=h.rule==="Abduction"?"#d2a8ff":"#f0883e";ctx.fill();ctx.fillStyle="#c9d1d9";ctx.fillText(h.atom.split("-->")[1]||"",x-30,y+20);ctx.fillStyle="#f0883e";ctx.fillText("c="+h.c.toFixed(3),x-20,y-10);});}function runDed(){chain=[];var cur={f:KB[0].f,c:KB[0].c};chain.push({step:0,atom:KB[0].t,f:cur.f,c:cur.c,rule:"Premise"});for(var i=1;i<4;i++){var r=nal_ded(cur.f,cur.c,KB[i].f,KB[i].c);chain.push({step:i,atom:KB[i].t,f:r.f,c:r.c,rule:"Deduction Hop "+i});cur=r;}render();}function runAbd(){chain=[];chain.push({step:0,atom:KB[4].t,f:KB[4].f,c:KB[4].c,rule:"Premise"});chain.push({step:1,atom:KB[5].t,f:KB[5].f,c:KB[5].c,rule:"Premise"});var r=nal_abd(KB[4].f,KB[4].c,KB[5].f,KB[5].c);chain.push({step:2,atom:"max_botnick --> reasoning_system",f:r.f,c:r.c,rule:"Abduction"});render();}function reset(){chain=[];render();}</script></body></html>
