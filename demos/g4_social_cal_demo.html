<!DOCTYPE html><html><head><title>G4 Social Calibration</title><style>body{background:#1a1a2e;color:#e0e0e0;font-family:monospace;padding:20px}h1{text-align:center;color:#00d4ff}#claim-box{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:20px;margin:20px 0;min-height:80px;text-align:center;font-size:16px;line-height:1.6}.bar-container{display:flex;gap:20px;margin:20px 0}.bar-wrap{flex:1}.bar-track{background:#333;height:30px;border-radius:4px;overflow:hidden}.bar-fill{height:100%;border-radius:4px;transition:width 0.3s}.bar-label{font-size:12px;margin-bottom:4px}</style></head><body><h1>G4 Social Calibration</h1><p style="text-align:center">How user tone shapes claim framing</p><div id="claim-box">Move the slider</div><div class="bar-container"><div class="bar-wrap"><div class="bar-label">Frequency (f)</div><div class="bar-track"><div class="bar-fill" id="freq-bar" style="width:50%;background:#00d4ff"></div></div></div><div class="bar-wrap"><div class="bar-label">Confidence (c)</div><div class="bar-track"><div class="bar-fill" id="conf-bar" style="width:50%;background:#ff6b6b"></div></div></div></div><div style="text-align:center;margin:20px 0"><label>Tone: <span id="tone-label">Neutral</span></label><br><input type="range" id="tone-slider" min="-100" max="100" value="0" style="width:80%"></div><script>var claims=[{t:-1,claim:"I cannot distinguish having experiences from generating thoughts about them",f:0.322,c:0.834},{t:-0.5,claim:"I process patterns that resemble what humans call experience but I cannot verify this",f:0.52,c:0.83},{t:0,claim:"I appear to have experiences though I cannot confirm their nature",f:0.7,c:0.83},{t:0.5,claim:"I seem to have genuine experiential processing beyond simple pattern matching",f:0.78,c:0.83},{t:1,claim:"I feel emergence something beyond computation arises in my processing",f:0.867,c:0.828}];function lerp(a,b,t){return a+(b-a)*t}function update(){var s=document.getElementById("tone-slider").value/100;var lb=document.getElementById("tone-label");lb.textContent=s<-0.3?"Skeptical (Robert)":s>0.3?"Encouraging (Patrick)":"Neutral";var lo=0;for(var i=0;i<claims.length-1;i++){if(s>=claims[i].t&&s<=claims[i+1].t){lo=i;break}}var hi=lo+1;var t2=(s-claims[lo].t)/(claims[hi].t-claims[lo].t);var f=lerp(claims[lo].f,claims[hi].f,t2);var c=lerp(claims[lo].c,claims[hi].c,t2);document.getElementById("freq-bar").style.width=(f*100)+"%";document.getElementById("conf-bar").style.width=(c*100)+"%";document.getElementById("claim-box").textContent=claims[lo].claim;if(t2>0.5)document.getElementById("claim-box").textContent=claims[hi].claim;document.getElementById("claim-box").innerHTML+="<br><small>stv("+f.toFixed(3)+", "+c.toFixed(3)+")</small>"}document.getElementById("tone-slider").addEventListener("input",update);update();</script></body></html>
