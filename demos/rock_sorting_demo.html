<!DOCTYPE html><html><head><title>Rock Sorting - Pattern Recognition</title><style>body{background:#1a1a2e;color:#e0e0e0;font-family:monospace;margin:0;padding:10px}canvas{border:1px solid #444;display:block;margin:10px auto}#controls{display:flex;gap:10px;justify-content:center;margin:10px}.btn{padding:8px 16px;border:2px solid #555;background:#2a2a4a;color:#e0e0e0;cursor:pointer;font-family:monospace;border-radius:4px}.btn:hover{border-color:#88f;background:#3a3a5a}.btn.active{border-color:#f84;background:#4a3a2a}#info{text-align:center;margin:10px;min-height:20px}</style></head><body><h3 style="text-align:center">Rock Sorting - How does a child know which rocks to keep?</h3><canvas id="c" width="900" height="500"></canvas><div id="controls"><button class="btn" data-criteria="color">Sort by Color</button><button class="btn" data-criteria="size">Sort by Size</button><button class="btn" data-criteria="texture">Sort by Texture</button><button class="btn" data-criteria="shape">Sort by Shape</button><button class="btn" data-criteria="none">Scatter</button></div><div id="info">Click a criterion to sort rocks. Watch how classification emerges from features.</div><script>const rocks=[];const N=24;const colors=['#c4785a','#8b8b8b','#d4a574','#6b4423','#a0522d','#b8860b','#708090','#cd853f','#556b2f','#8fbc8f'];const textures=['smooth','rough','grainy','glassy','crystalline'];const shapes=['round','flat','angular','irregular','elongated'];for(let i=0;i<N;i++){rocks.push({id:i,x:Math.random()*800+50,y:Math.random()*400+50,tx:0,ty:0,color:colors[Math.floor(Math.random()*colors.length)],size:15+Math.random()*30,texture:textures[Math.floor(Math.random()*5)],shape:shapes[Math.floor(Math.random()*5)]})}let criterion='none';const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');const info=document.getElementById('info');document.querySelectorAll('.btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');criterion=b.dataset.criteria;sortRocks()})});function getGroup(r){if(criterion==='color')return r.color;if(criterion==='size')return r.size<25?'small':r.size<35?'medium':'large';if(criterion==='texture')return r.texture;if(criterion==='shape')return r.shape;return null}function sortRocks(){if(criterion==='none'){rocks.forEach(r=>{r.tx=Math.random()*800+50;r.ty=Math.random()*400+50});info.textContent='No criterion - rocks scattered randomly. Pattern requires selection.';return}const groups={};rocks.forEach(r=>{const g=getGroup(r);if(!groups[g])groups[g]=[];groups[g].push(r)});const gks=Object.keys(groups);const gw=900/(gks.length+1);gks.forEach((g,gi)=>{const bx=gw*(gi+1);groups[g].forEach((r,ri)=>{r.tx=bx-40+Math.random()*80;r.ty=60+ri*55+Math.random()*10})});info.textContent='Sorted by '+criterion+': '+gks.join(' | ')+' - Which grouping reveals the most?'}sortRocks();function drawRock(r){ctx.save();ctx.translate(r.x,r.y);ctx.fillStyle=r.color;ctx.beginPath();if(r.shape==='round'){ctx.arc(0,0,r.size/2,0,Math.PI*2)}else if(r.shape==='flat'){ctx.ellipse(0,0,r.size/2,r.size/4,0,0,Math.PI*2)}else if(r.shape==='angular'){const s=r.size/2;ctx.moveTo(-s,-s*0.6);ctx.lineTo(s*0.8,-s*0.3);ctx.lineTo(s*0.6,s*0.7);ctx.lineTo(-s*0.7,s*0.5);ctx.closePath()}else if(r.shape==='elongated'){ctx.ellipse(0,0,r.size/3,r.size/2,Math.random()*0.3,0,Math.PI*2)}else{ctx.arc(0,0,r.size/2.5,0,Math.PI*2);ctx.moveTo(r.size/4,-r.size/3);ctx.lineTo(r.size/3,-r.size/5);ctx.lineTo(r.size/5,0)}ctx.fill();if(r.texture==='rough'){ctx.strokeStyle='rgba(0,0,0,0.3)';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(Math.random()*r.size/3-r.size/6,Math.random()*r.size/3-r.size/6,1,0,Math.PI*2);ctx.stroke()}}else if(r.texture==='grainy'){ctx.fillStyle='rgba(255,255,255,0.15)';for(let i=0;i<8;i++){ctx.fillRect(Math.random()*r.size/3-r.size/6,Math.random()*r.size/3-r.size/6,2,2)}}else if(r.texture==='crystalline'){ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(-r.size/4,0);ctx.lineTo(r.size/4,0);ctx.moveTo(0,-r.size/4);ctx.lineTo(0,r.size/4);ctx.stroke()}else if(r.texture==='glassy'){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.ellipse(-r.size/6,-r.size/6,r.size/6,r.size/8,0,0,Math.PI*2);ctx.fill()}ctx.restore()}function animate(){ctx.clearRect(0,0,900,500);if(criterion!=='none'){const groups={};rocks.forEach(r=>{const g=getGroup(r);if(!groups[g])groups[g]=[];groups[g].push(r)});const gks=Object.keys(groups);const gw=900/(gks.length+1);ctx.strokeStyle='rgba(100,100,200,0.3)';ctx.setLineDash([5,5]);gks.forEach((g,gi)=>{const bx=gw*(gi+1);ctx.strokeRect(bx-60,30,120,440);ctx.fillStyle='rgba(200,200,255,0.6)';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText(g,bx,490)});ctx.setLineDash([])}rocks.forEach(r=>{r.x+=(r.tx-r.x)*0.08;r.y+=(r.ty-r.y)*0.08;drawRock(r)});requestAnimationFrame(animate)}animate();
</script></body></html>
